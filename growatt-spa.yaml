############################################################################################################################################
# TEXT SENSOR
############################################################################################################################################

text_sensor:
  - platform: template
    name: "Letzter MQTT JSON Befehl"
    id: mqtt_json_receiver
    icon: "mdi:code-json"
    on_value:
      then:
        - lambda: |-
            StaticJsonDocument<256> doc;
            DeserializationError error = deserializeJson(doc, x);
            if (error) {
              ESP_LOGW("MODBUS", "JSON Parse Error");
              return;
            }

            using namespace esphome::modbus_controller;

            // NEW: Active P Rate (Holding Register 3)
            // - Accepts: {"active_p_rate": 0..100}
            // - Writes:  holding register 3
            if (doc.containsKey("active_p_rate")) {
              int apr = (int) doc["active_p_rate"];
              if (apr < 0) apr = 0;
              if (apr > 100) apr = 100;

              {
                std::vector<uint16_t> values{(uint16_t) apr};
                id(growatt).queue_command(
                  ModbusCommandItem::create_write_multiple_command(id(growatt), 3, 1, values)
                );
              }
              ESP_LOGW("MODBUS", "WRITE 3 (Active P Rate) = %d", apr);
            }

            // Mode switching (Period 1):
            // - GridFirst: 1080/1081 (Start/Stop) + 1082 (Enable)
            // - BatFirst : 1100/1101 (Start/Stop) + 1102 (Enable)
            // Mutual exclusion: if gf_en1 present, ignore bf keys.

            const bool has_gf = doc.containsKey("gf_en1");
            const bool has_bf = doc.containsKey("bf_en1") || doc.containsKey("bat_first");

            if (has_gf && has_bf) {
              ESP_LOGW("MODBUS", "JSON enthält gf_en1 -> bf/bat_first wird ignoriert");
            }

            if (has_gf) {
              int v = (int) doc["gf_en1"];

              // If GridFirst Period 1 is enabled, also set its time window from JSON:
              // - 1080 = gf_start1
              // - 1081 = gf_stop1
              if (v == 1) {
                if (doc.containsKey("gf_start1") && doc.containsKey("gf_stop1")) {
                  int start1 = (int) doc["gf_start1"];
                  int stop1  = (int) doc["gf_stop1"];

                  {
                    std::vector<uint16_t> values{(uint16_t) start1};
                    id(growatt).queue_command(
                      ModbusCommandItem::create_write_multiple_command(id(growatt), 1080, 1, values)
                    );
                  }
                  ESP_LOGW("MODBUS", "WRITE 1080 (GF Start1) = %d", start1);

                  {
                    std::vector<uint16_t> values{(uint16_t) stop1};
                    id(growatt).queue_command(
                      ModbusCommandItem::create_write_multiple_command(id(growatt), 1081, 1, values)
                    );
                  }
                  ESP_LOGW("MODBUS", "WRITE 1081 (GF Stop1) = %d", stop1);
                } else {
                  ESP_LOGW("MODBUS", "gf_en1=1 aber gf_start1/gf_stop1 fehlen -> Zeitfenster wird NICHT geschrieben");
                }
              }

              {
                std::vector<uint16_t> values{(uint16_t) v};
                id(growatt).queue_command(
                  ModbusCommandItem::create_write_multiple_command(id(growatt), 1082, 1, values)
                );
              }
              ESP_LOGW("MODBUS", "WRITE 1082 (GF Enable1) = %d", v);
              return;
            }

            if (has_bf) {
              int v = doc.containsKey("bf_en1") ? (int) doc["bf_en1"] : (int) doc["bat_first"];

              // If BatteryFirst Period 1 is enabled, also set its time window from JSON:
              // - 1100 = bf_start1
              // - 1101 = bf_stop1
              if (v == 1) {
                // When enabling BatteryFirst Period 1, also apply charge power rate from JSON.
                // 1090 = Charge Power Rate (0..100)
                if (doc.containsKey("bf_power_rate")) {
                  int pr = (int) doc["bf_power_rate"];
                  {
                    std::vector<uint16_t> values{(uint16_t) pr};
                    id(growatt).queue_command(
                      ModbusCommandItem::create_write_multiple_command(id(growatt), 1090, 1, values)
                    );
                  }
                  ESP_LOGW("MODBUS", "WRITE 1090 (BF PowerRate) = %d", pr);
                } else {
                  ESP_LOGW("MODBUS", "bf_en1=1 aber bf_power_rate fehlt -> 1090 wird NICHT geschrieben");
                }

                if (doc.containsKey("bf_start1") && doc.containsKey("bf_stop1")) {
                  int start1 = (int) doc["bf_start1"];
                  int stop1  = (int) doc["bf_stop1"];

                  {
                    std::vector<uint16_t> values{(uint16_t) start1};
                    id(growatt).queue_command(
                      ModbusCommandItem::create_write_multiple_command(id(growatt), 1100, 1, values)
                    );
                  }
                  ESP_LOGW("MODBUS", "WRITE 1100 (BF Start1) = %d", start1);

                  {
                    std::vector<uint16_t> values{(uint16_t) stop1};
                    id(growatt).queue_command(
                      ModbusCommandItem::create_write_multiple_command(id(growatt), 1101, 1, values)
                    );
                  }
                  ESP_LOGW("MODBUS", "WRITE 1101 (BF Stop1) = %d", stop1);
                } else {
                  ESP_LOGW("MODBUS", "bf_en1=1 aber bf_start1/bf_stop1 fehlen -> Zeitfenster wird NICHT geschrieben");
                }
              }

              {
                std::vector<uint16_t> values{(uint16_t) v};
                id(growatt).queue_command(
                  ModbusCommandItem::create_write_multiple_command(id(growatt), 1102, 1, values)
                );
              }
              ESP_LOGW("MODBUS", "WRITE 1102 (BF Enable1) = %d", v);
              return;
            }

            // Nothing to do

  - platform: template
    name: "ESP Restart Time"
    id: last_boot_time_sensor
    icon: "mdi:clock"
    update_interval: never
    state_topic: "${mqtt_prefix}/ESP/restart/time"
    lambda: |-
      if (!id(system_time).now().is_valid()) {
          return {"Warte auf SNTP..."};
      }
      auto now = id(system_time).now();
      auto boot_timestamp = now.timestamp - (int) id(esp_uptime).state;
      auto boot_time = esphome::ESPTime::from_epoch_local(boot_timestamp);
      char str[25];
      snprintf(str, sizeof(str), "%02u.%02u.%02u %02u:%02u:%02u",
               (unsigned int) boot_time.day_of_month,
               (unsigned int) boot_time.month,
               (unsigned int) (boot_time.year % 100),
               (unsigned int) boot_time.hour,
               (unsigned int) boot_time.minute,
               (unsigned int) boot_time.second);
      return {str};

  - platform: template
    name: "ESP Uptime Formatted"
    id: uptime_string
    state_topic: "${mqtt_prefix}/ESP/uptime"

  - platform: wifi_info
    ip_address:
      name: WiFi-IPAddress
      state_topic: "${mqtt_prefix}/WiFi/IPAddress"
    ssid:
      name: WiFi-SSID
      state_topic: "${mqtt_prefix}/WiFi/SSID"
    bssid:
      id: bssid_sensor
      name: WiFi-BSSID
      state_topic: "${mqtt_prefix}/WiFi/BSSID"
    mac_address:
      name: WiFi-MacAddress
      state_topic: "${mqtt_prefix}/WiFi/MAC"

  - platform: custom
    lambda: |-
      auto ap_name_sensor = new APNameTemplate();
      ap_name_sensor->bssid_sensor = id(bssid_sensor);
      App.register_component(ap_name_sensor);
      return {ap_name_sensor};
    text_sensors:
      - name: "WiFi-Access Point Name"
        id: ap_name_sensor
        disabled_by_default: true
        on_value:
          then:
            - if:
                condition:
                  lambda: 'return id(init_done);'
                then:
                  - mqtt.publish:
                      topic: "${mqtt_prefix}/WiFi/AP_Name"
                      payload: !lambda 'return id(ap_name_sensor).state;'

switch:

  - platform: template
    name: "Growatt Dump Holding 1000-1124"
    id: dump_holding_1000_1124
    optimistic: true
    retain: false
    turn_on_action:
      - lambda: |-
          id(dump_request) = true;
      - delay: 500ms
      - switch.turn_off: dump_holding_1000_1124

  - platform: template
    name: "Growatt Dump Holding 0000-0124"
    id: dump_holding_0000_0124
    optimistic: true
    retain: false
    turn_on_action:
      - lambda: |-
          id(dump_request_0000_0124) = true;
      - delay: 500ms
      - switch.turn_off: dump_holding_0000_0124

  - platform: template
    name: "ESP Restart"
    id: restart_esp
    optimistic: true
    retain: true
    state_topic: "${mqtt_prefix}/ESP/restart/state"
    command_topic: "${mqtt_prefix}/ESP/restart/command"
    turn_on_action:
      - delay: 500ms
      - lambda: ESP.restart();
